const app=document.getElementById("app");

log("Script started");
if(!window.supabase){log("Supabase library NOT loaded");}
const supabaseClient=supabase.createClient("nmwziqovwfvdrixqnnoa.supabase.co","eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im5td3ppcW92d2Z2ZHJpeHFubm9hIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODA2NTc1NjgsImV4cCI6MjA5NjIzMzU2OH0.3XFSAHGkXbOXNC-OqTBRvaj68XsCL7pXRXhSYCNjUkc");
log("Supabase client created");
async function createRoom(){
try{
let code=Math.random().toString(36).substring(2,7);
let res=await supabaseClient.from("rooms").insert({code,teacher_id:"teacher"}).select().single();
if(res.error){log("Insert error: "+JSON.stringify(res.error));return;}

}catch(e){log("Exception: "+e.message);}
}

log("Ready. Run createRoom() from JS (we will add buttons next)");
