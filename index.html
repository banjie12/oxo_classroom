<!DOCTYPE html>
<html>
<body>
<div id="app">Loading...</div>

<script src="https://unpkg.com/@supabase/supabase-js@2"></script>

<script>
const app=document.getElementById("app");
function log(t){app.innerText+="\n"+t;}
window.onerror=(m,s,l,c)=>log("ERROR:"+m);

const supabaseClient=supabase.createClient("nmwziqovwfvdrixqnnoa.supabase.co","eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im5td3ppcW92d2Z2ZHJpeHFubm9hIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODA2NTc1NjgsImV4cCI6MjA5NjIzMzU2OH0.3XFSAHGkXbOXNC-OqTBRvaj68XsCL7pXRXhSYCNjUkc");

let room=null;
let role=null;
let board=Array(9).fill(null);
let annotations=[];
let dragStart=null;

function render(){
let html=`<div>
<button onclick="createRoom()">Create Room (Teacher)</button>
<input id="code" placeholder="room code">
<button onclick="joinRoom()">Join (Student)</button>
<button onclick="toggleMode()">Toggle Mode</button>
<button onclick="toggleShare()">Toggle Share</button>
</div><br><div style="display:grid;grid-template-columns:repeat(3,100px)">`;

for(let i=0;i<9;i++){
html+=`<div data-i="${i}" style="width:100px;height:100px;border:1px solid black;display:flex;align-items:center;justify-content:center;font-size:30px;user-select:none;background:${annotations.find(a=>a.type==="highlight"&&a.cell===i)?"red":"white"}">${board[i]||""}</div>`;
}

html+=`</div>`;
app.innerHTML=html;

document.querySelectorAll("[data-i]").forEach(el=>{
el.onclick=()=>makeMove(parseInt(el.dataset.i));

el.oncontextmenu=(e)=>{
e.preventDefault();
toggleHighlight(parseInt(el.dataset.i));
};

el.onmousedown=(e)=>{
if(e.button===2)return;
dragStart=parseInt(el.dataset.i);
};

el.onmouseup=(e)=>{
if(dragStart===null)return;
let end=parseInt(el.dataset.i);
if(end!==dragStart) createArrow(dragStart,end);
dragStart=null;
};
});
}

async function createRoom(){
let code=Math.random().toString(36).substring(2,7);
room=(await supabaseClient.from("rooms").insert({
code,
teacher_id:"teacher",
mode:"game",
game_active:false,
current_turn:"X",
share_annotations:true
}).select().single()).data;
role="X";
log("Room: "+code);
subscribe();
render();
}

async function joinRoom(){
let code=document.getElementById("code").value;
room=(await supabaseClient.from("rooms").select().eq("code",code).single()).data;
role="O";
log("Joined");
subscribe();
loadBoard();
}

async function loadBoard(){
let res=await supabaseClient.from("board_state").select().eq("room_id",room.id);
board=Array(9).fill(null);
res.data.forEach(b=>board[b.cell_index]=b.value);
render();
}

async function makeMove(i){
if(!room.game_active)return;
if(board[i])return;
if(room.current_turn!==role && room.mode==="game")return;

board[i]=room.current_turn;

await supabaseClient.from("board_state").insert({
room_id:room.id,
cell_index:i,
value:room.current_turn
});

await switchTurn();
checkWin();
render();
}

async function switchTurn(){
room.current_turn=room.current_turn==="X"?"O":"X";
await supabaseClient.from("rooms").update({current_turn:room.current_turn}).eq("id",room.id);
}

function checkWin(){
let w=[[0,1,2],[3,4,5],[6,7,8],[0,3,6],[1,4,7],[2,5,8],[0,4,8],[2,4,6]];
for(let p of ["X","O"]){
for(let c of w){
if(c.every(i=>board[i]===p)){
log(p+" wins!");
room.game_active=false;
supabaseClient.from("rooms").update({game_active:false}).eq("id",room.id);
}
}
}
}

async function toggleHighlight(i){
let existing=annotations.find(a=>a.type==="highlight"&&a.cell===i);

if(existing){
await supabaseClient.from("annotations").delete().eq("id",existing.id);
}else{
await supabaseClient.from("annotations").insert({
room_id:room.id,
type:"highlight",
cell:i,
color:"red",
author_role:role
});
}

loadAnnotations();
}

async function createArrow(a,b){
await supabaseClient.from("annotations").insert({
room_id:room.id,
type:"arrow",
from_cell:a,
to_cell:b,
author_role:role
});
loadAnnotations();
}

async function loadAnnotations(){
let res=await supabaseClient.from("annotations").select().eq("room_id",room.id);
annotations=res.data;
render();
}

async function toggleMode(){
room.mode=room.mode==="game"?"analysis":"game";
room.game_active=false;
await supabaseClient.from("rooms").update({mode:room.mode,game_active:false}).eq("id",room.id);
log("Mode: "+room.mode);
}

async function toggleShare(){
room.share_annotations=!room.share_annotations;
await supabaseClient.from("rooms").update({share_annotations:room.share_annotations}).eq("id",room.id);
log("Share: "+room.share_annotations);
}

function subscribe(){
supabaseClient.channel("room-"+room.id)
.on("postgres_changes",{event:"*",schema:"public",table:"board_state"},loadBoard)
.on("postgres_changes",{event:"*",schema:"public",table:"annotations"},loadAnnotations)
.subscribe();
}

window.createRoom=createRoom;
window.joinRoom=joinRoom;
window.toggleMode=toggleMode;
window.toggleShare=toggleShare;

render();
log("Ready");
</script>
</body>
</html>
